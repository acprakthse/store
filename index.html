    :root {
      --ink: #0a0a0a;
      --paper: #f0ebe0;
      --red: #e63030;
      --yellow: #f5c800;
      --blue: #1a4fff;
      --green: #00a86b;
      --orange: #ff6b2b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      font-family: 'Space Mono', monospace;
      color: var(--ink);
      overflow-x: hidden;
      cursor: crosshair;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.5;
    }

    .bg-blob {
      position: fixed;
      border-radius: 50% 40% 60% 30% / 50% 60% 40% 50%;
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
      animation: morphBlob 8s ease-in-out infinite alternate;
    }
    .bg-blob:nth-child(1) { width:600px;height:500px;background:var(--red);top:-150px;left:-200px;animation-delay:0s }
    .bg-blob:nth-child(2) { width:500px;height:600px;background:var(--blue);bottom:-200px;right:-150px;animation-delay:-3s }
    .bg-blob:nth-child(3) { width:400px;height:350px;background:var(--yellow);top:30%;left:40%;animation-delay:-5s }
    @keyframes morphBlob {
      0%   { border-radius:50% 40% 60% 30%/50% 60% 40% 50%;transform:scale(1) rotate(0deg) }
      50%  { border-radius:30% 60% 40% 70%/60% 30% 70% 40%;transform:scale(1.05) rotate(5deg) }
      100% { border-radius:60% 30% 50% 40%/40% 70% 30% 60%;transform:scale(0.95) rotate(-3deg) }
    }

    header { position:relative;z-index:10;padding:4rem 2rem 2rem;text-align:center }
    .header-stamp { display:inline-block;position:relative }
    .header-stamp h1 {
      font-family:'Caveat',cursive;font-size:clamp(3.5rem,9vw,7rem);
      font-weight:700;line-height:0.9;color:var(--ink);position:relative;z-index:2
    }
    .header-stamp::before {
      content:'';position:absolute;inset:-20px -40px;background:var(--yellow);

      z-index:1;animation:wiggle 4s ease-in-out infinite alternate
    }
    @keyframes wiggle {
      0%   { transform:rotate(-1deg) scale(1) }
      100% { transform:rotate(1.5deg) scale(1.02) }
    }
    .header-sub {
      font-family:'Caveat',cursive;font-size:1.4rem;margin-top:1.5rem;
      opacity:0.7;transform:rotate(-1.5deg);display:inline-block
    }
    .scribble-divider { display:block;margin:2rem auto;width:min(90%,700px) }

    .filter-row {
      position:relative;z-index:10;display:flex;flex-wrap:wrap;
      gap:0.8rem;justify-content:center;padding:0 2rem 2rem
    }
    .filter-tag {
      font-family:'Caveat',cursive;font-size:1.1rem;padding:0.35rem 1.2rem;
      border:2.5px solid var(--ink);background:transparent;cursor:pointer;
      transition:all 0.15s;transform:rotate(var(--r));position:relative

    .filter-tag:nth-child(1){--r:-2deg}.filter-tag:nth-child(2){--r:1.5deg}
    .filter-tag:nth-child(3){--r:-1deg}.filter-tag:nth-child(4){--r:2deg}
    .filter-tag.active,.filter-tag:hover {
      background:var(--ink);color:var(--paper);transform:rotate(var(--r)) scale(1.05)
    }

    .filter-status {
      font-family:'Caveat',cursive;font-size:1.25rem;font-weight:700;
      padding:0.5rem 1.8rem;border:3px solid var(--ink);background:transparent;
      cursor:pointer;transition:all 0.15s;position:relative;letter-spacing:.02em

    .filter-status:nth-child(1){ border-color:var(--ink) }
    .filter-status:nth-child(2){ border-color:var(--green);color:var(--green) }
    .filter-status:nth-child(3){ border-color:#999;color:#999 }
    .filter-status:hover,
    .filter-status.active {
      color:var(--paper);transform:scale(1.07)
    }
    .filter-status:nth-child(1).active,
    .filter-status:nth-child(1):hover { background:var(--ink) }
    .filter-status:nth-child(2).active,
    .filter-status:nth-child(2):hover { background:var(--green);border-color:var(--green);color:var(--paper) }
    .filter-status:nth-child(3).active,
    .filter-status:nth-child(3):hover { background:#999;border-color:#999;color:var(--paper) }

    .grid {
      position:relative;z-index:10;columns:1;column-gap:1.5rem;
      padding:1rem 1.5rem 4rem;max-width:1200px;margin:auto
    }
    @media(min-width:600px){.grid{columns:2}}
    @media(min-width:900px){.grid{columns:3}}
    @media(min-width:1100px){.grid{columns:4}}

    .card {
      break-inside:avoid;position:relative;margin-bottom:1.5rem;
      border:2.5px solid var(--ink);background:var(--paper);
      transform:rotate(var(--tilt,0deg));
      transition:transform 0.2s ease;overflow:visible;
      animation:cardIn 0.4s ease both
    }
    .card::before {
      content:'';position:absolute;inset:4px -4px -4px 4px;
      border:2.5px solid var(--ink);background:var(--card-accent,var(--yellow));
      z-index:-1;transition:inset 0.2s ease
    }
    .card:hover { transform:rotate(0deg) scale(1.02);z-index:20 }
    .card:hover::before { inset:6px -6px -6px 6px }

    .card:nth-child(1){--tilt:-1.5deg;--card-accent:#ffd600}
    .card:nth-child(2){--tilt:2deg;--card-accent:#ff6b6b}
    .card:nth-child(3){--tilt:-0.8deg;--card-accent:#74c7ff}
    .card:nth-child(4){--tilt:1.5deg;--card-accent:#b5ffb5}
    .card:nth-child(5){--tilt:-2deg;--card-accent:#ffb347}
    .card:nth-child(6){--tilt:0.5deg;--card-accent:#ffd600}
    .card:nth-child(7){--tilt:-1.2deg;--card-accent:#ff6b6b}
    .card:nth-child(8){--tilt:1.8deg;--card-accent:#74c7ff}
    .card:nth-child(9){--tilt:-0.6deg;--card-accent:#b5ffb5}
    .card:nth-child(10){--tilt:1.3deg;--card-accent:#ffb347}

    .card:nth-child(5){animation-delay:.25s}.card:nth-child(6){animation-delay:.3s}

      from{opacity:0;transform:rotate(var(--tilt,0deg)) translateY(20px)}
      to{opacity:1;transform:rotate(var(--tilt,0deg)) translateY(0)}

    .card-img-wrap {

    .card-img {

      position:absolute;bottom:0;left:0;right:0;
      background:linear-gradient(transparent, rgba(0,0,0,0.55));
      color:white;font-family:'Caveat',cursive;font-size:0.9rem;
      padding:1.5rem 0.8rem 0.5rem;
      opacity:0;transition:opacity 0.2s;pointer-events:none

    .card-img-wrap:hover::after { opacity:1 }

    .card-img-placeholder {
      width:100%;aspect-ratio:4/3;display:flex;align-items:center;
      justify-content:center;font-size:3rem;border-bottom:2.5px solid var(--ink);
      background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(0,0,0,.04) 10px,rgba(0,0,0,.04) 20px)

    .card-name { font-family:'Caveat',cursive;font-size:1.5rem;font-weight:700;line-height:1.1;margin-bottom:.4rem }
    .card-desc { font-size:0.72rem;line-height:1.5;opacity:0.7;margin-bottom:.8rem;white-space:pre-line }
    .card-price {
      font-size:1.3rem;font-weight:700;letter-spacing:-.05em;margin-bottom:.8rem;
      display:flex;align-items:baseline;gap:.3rem

    .card-price span { font-size:0.7rem;opacity:0.6;font-weight:400 }

    .wa-btn {

    .wa-btn:hover { background:#25D366;border-color:#25D366 }

    .card.sold { opacity:.45;pointer-events:none }

      z-index:10;letter-spacing:.1em

    .card.hidden { display:none }

    /* ── LIGHTBOX ── */
    #lightbox {
      position:fixed;inset:0;z-index:10000;
      background:rgba(10,10,10,.93);
      display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;
      opacity:0;pointer-events:none;
      transition:opacity .25s ease;
      cursor:zoom-out

    #lightbox.open { opacity:1;pointer-events:all }

    #lightbox-img {
      max-width:92vw;max-height:80vh;object-fit:contain;
      border:3px solid rgba(255,255,255,.15);
      transform:scale(.92);transition:transform .3s ease;
      cursor:default;display:block

    #lightbox.open #lightbox-img { transform:scale(1) }

    #lightbox-close {
      position:fixed;top:1.2rem;right:1.5rem;
      font-family:'Caveat',cursive;font-size:2.2rem;color:white;
      cursor:pointer;line-height:1;z-index:10001;
      background:none;border:none;transition:transform .15s;

    #lightbox-caption {

    @keyframes drift {
      from{transform:translateY(100vh) rotate(0deg)}

    footer {

</head>

// ── Kategorisasi otomatis ──
function getKat(item) {
  const n = item.nama.toLowerCase();
  if (/sepeda|jonna/.test(n))                                           return 'sepeda';
  if (/helm/.test(n))                                                   return 'sepeda';
  if (/skate|skating/.test(n))                                          return 'sepatu-acc';
  if (/sepatu|boots|boot/.test(n))                                      return 'sepatu-acc';
  if (/pulka/.test(n))                                                  return 'sepatu-acc';
  if (/microwave|rice cooker|deep fryer|fryer|printer|elektronik/.test(n)) return 'elektronik';
  if (/jaket|jacket|peacoat|kemeja|celana|baju|rok|sweater|hoodie|jogger|pants|sweatpants|training|overall|loungewear|t-shirt|polo|parka|vest|rompi|dress|overcoat|puffer|cardigan/.test(n)) return 'pakaian';
  return 'lainnya';
}

// ── Render cards dari ITEMS ──
const grid = document.getElementById('grid');

ITEMS.forEach((item, i) => {
  const num     = String(i + 1).padStart(2, '0');
  const isSold  = item.status === 'terjual';
  const kondisi = item.kondisi || 'baik';
  const photos  = Array.isArray(item.foto) ? item.foto : (item.foto ? [item.foto] : []);

  const stickerClass = isSold ? 'terjual' : `kondisi-${kondisi}`;
  const stickerText  = isSold
    ? `✕ ${item.soldLabel || 'Terjual'}`
    : kondisi === 'baik' ? '● Baik' : '◐ Cukup';

  const imgMarkup = photos.length
    ? `<div class="card-img-wrap"
            data-photos='${JSON.stringify(photos)}'
            data-nama="${item.nama.replace(/"/g, '&quot;')}">
         <img class="card-img" src="${photos[0]}" alt="${item.nama}" loading="lazy"/>
       </div>`
    : `<div class="card-img-placeholder">📦</div>`;

  const priceMarkup = item.label
    ? `<p class="card-price">${item.harga} <span>${item.label}</span></p>`
    : `<p class="card-price">${item.harga}</p>`;

  const msg   = encodeURIComponent(`Halo Ardian! Saya tertarik dengan ${item.nama} 😊`);
  const waBtn = !isSold
    ? `<a class="wa-btn" href="https://wa.me/${WA_NUMBER}?text=${msg}" target="_blank">${WA_ICON} Chat di WhatsApp</a>`
    : '';

  const div = document.createElement('div');
  div.className = `card${isSold ? ' sold' : ''}`;
  div.dataset.kondisi = kondisi;
  div.dataset.status  = item.status;
  div.dataset.kat     = getKat(item);
  div.innerHTML = `
    <div class="card-num">${num}</div>
    <span class="sticker ${stickerClass}">${stickerText}</span>
    ${imgMarkup}
    <div class="card-body">
      <h2 class="card-name">${item.nama}</h2>
      <p class="card-desc">${item.desc || ''}</p>
      ${priceMarkup}
      ${waBtn}
    </div>`;
  grid.appendChild(div);
});

// ── Lightbox ──
const lightbox = document.getElementById('lightbox');
const lbImg    = document.getElementById('lightbox-img');
const lbCap    = document.getElementById('lightbox-caption');
const lbDots   = document.getElementById('lightbox-dots');
const lbClose  = document.getElementById('lightbox-close');
let lbPhotos = [], lbIndex = 0;

function showPhoto(idx) {
  lbIndex = idx;
  lbImg.src = lbPhotos[idx];
  lbDots.querySelectorAll('.lb-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}

function openLightbox(photos, nama, startIdx = 0) {
  lbPhotos = photos;
  lbCap.textContent = nama;

  // build dots only if multiple photos
  lbDots.innerHTML = photos.length > 1
    ? photos.map((_, i) => `<button class="lb-dot${i===startIdx?' active':''}" data-i="${i}"></button>`).join('')
    : '';

  lbImg.src = photos[startIdx];
  lbIndex   = startIdx;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}

// open on image click
document.getElementById('grid').addEventListener('click', e => {
  const wrap = e.target.closest('.card-img-wrap[data-photos]');
  if (!wrap) return;
  const photos = JSON.parse(wrap.dataset.photos);
  const nama   = wrap.dataset.nama;
  openLightbox(photos, nama);
});

// dot navigation
lbDots.addEventListener('click', e => {
  const dot = e.target.closest('.lb-dot');
  if (dot) showPhoto(Number(dot.dataset.i));
});

// arrow key navigation
document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape')      closeLightbox();
  if (e.key === 'ArrowRight')  showPhoto((lbIndex + 1) % lbPhotos.length);
  if (e.key === 'ArrowLeft')   showPhoto((lbIndex - 1 + lbPhotos.length) % lbPhotos.length);
});

lbClose.addEventListener('click', closeLightbox);
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

// ── Filter ──
let activeKat    = 'all';
let activeStatus = 'all';

function applyFilters() {
  document.querySelectorAll('.card').forEach(card => {
    const katOk    = activeKat === 'all' || card.dataset.kat    === activeKat;
    const statusOk = activeStatus === 'all' || card.dataset.status === activeStatus;
    card.classList.toggle('hidden', !(katOk && statusOk));
  });
}

document.querySelectorAll('.filter-tag').forEach(tag => {
  tag.addEventListener('click', () => {
    document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
    tag.classList.add('active');
    activeKat = tag.dataset.filter;
    applyFilters();
  });
});

document.querySelectorAll('.filter-status').forEach(tag => {
  tag.addEventListener('click', () => {
    document.querySelectorAll('.filter-status').forEach(t => t.classList.remove('active'));
    tag.classList.add('active');
    activeStatus = tag.dataset.status;
    applyFilters();
  });
});

// ── Parallax blobs ──
document.addEventListener('mousemove', e => {
  const x = (e.clientX / innerWidth  - 0.5) * 20;
  const y = (e.clientY / innerHeight - 0.5) * 20;
  document.querySelectorAll('.bg-blob').forEach((b, i) => {
    const d = i % 2 === 0 ? 1 : -1;
    b.style.transform = `translate(${x*d*.4}px,${y*d*.4}px)`;
  });
});
</script>
</body>
</html>
